name: funcat
channels:
  - bioconda
  - conda-forge
  - defaults
dependencies:
  - python=3.10

  # ── Core assembly tools (REQUIRED) ─────────────────────────────────────
  - flye                           # De novo long-read assembly
  - minimap2                       # Universal read/contig mapping
  - seqkit                         # Read and assembly statistics
  - filtlong                       # Coverage-based read downsampling

  # ── Alignment & BAM handling (REQUIRED) ───────────────────────────────
  # samtools MUST be >=1.17 for Medaka compatibility
  - samtools>=1.17                 # BAM handling, depth analysis, sorting
  - bcftools                       # VCF variant calling (Medaka dependency)
  - htslib                         # bgzip & tabix for VCF compression (Medaka dependency)
  - bwa                            # Illumina read alignment for hybrid polishing

  # ── Polishing & enhancement (ALL INCLUDED) ────────────────────────────
  - racon                          # PacBio HiFi polishing
  - polypolish                     # Illumina polishing (default, includes polypolish_insert_filter)
  - pilon                          # Alternative Illumina polisher

  # ── Assembly optimization & analysis ──────────────────────────────────
  - purge_dups                     # Diploid haplotig removal & repeat detection
  - mummer4                        # Whole-genome comparison, SNP detection, dotplots

  # ── Python packages (ALL REQUIRED) ────────────────────────────────────
  - pandas>=1.5                    # Data handling, TSV/CSV processing
  - matplotlib>=3.6                # QC plots and visualizations
  - biopython>=1.81                # FASTA/FASTQ parsing (SeqIO)
  - decorator>=4.0                 # Python utilities
  - typer>=0.9                     # CLI framework
  - pip                            # Package manager for pip-only packages

  - pip:
    # Medaka must be pip-installed (no conda package available)
    # Requires bcftools, bgzip, tabix to be on PATH (installed above)
    - medaka                       # ONT long-read consensus polishing
    - pyabpoa                      # Medaka optimization (reduces warnings, speeds up polishing)
    # Install FunCAT itself from GitHub
    - git+https://github.com/beyhanlab/FunCAT.git
